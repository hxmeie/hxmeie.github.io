<!--
  面试模块口令门（软门槛）。
  说明：这是纯静态站点的客户端口令，仅用于「不想被随手翻到」，并非真正加密——
  懂技术的人查看源码/DOM 仍可拿到内容。需要真正保密请改用构建后整页加密（StaticCrypt）。

  修改口令：把下面的 PW_HASH 换成新口令的 SHA-256（小写十六进制）。生成方式：
    printf '%s' '你的新口令' | shasum -a 256
-->
<div id="interview-lock" class="interview-lock">
  <p class="interview-lock__title">
    <i class="fas fa-lock fa-fw"></i> 该内容需要口令访问
  </p>
  <div class="interview-lock__form">
    <input type="password" id="interview-pw" class="form-control" placeholder="请输入口令" autocomplete="off" />
    <button type="button" id="interview-btn" class="btn btn-primary">解锁</button>
  </div>
  <p id="interview-err" class="interview-lock__err" hidden>口令不正确，请重试。</p>
</div>

<script>
  (function () {
    var PW_HASH = '62a75f09a9b327c37dc4e62db9183fbbc485362876dccd0c33ff525a87581120';
    var STORE_KEY = 'interview_unlocked';

    async function sha256Hex(str) {
      var data = new TextEncoder().encode(str);
      var buf = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(buf))
        .map(function (b) { return b.toString(16).padStart(2, '0'); })
        .join('');
    }

    // 必须等 DOM 就绪后再执行：脚本在源码中位于 .interview-protected 之前，
    // 若同步执行，自动解锁时受保护内容还没进 DOM，会导致切回来后列表不显示。
    function init() {
      var lock = document.getElementById('interview-lock');
      var input = document.getElementById('interview-pw');
      var btn = document.getElementById('interview-btn');
      var err = document.getElementById('interview-err');

      function reveal() {
        if (lock) lock.hidden = true;
        document.querySelectorAll('.interview-protected').forEach(function (el) {
          el.hidden = false;
        });
      }

      // 同一会话内解锁一次即可，刷新/跳转到其它面试文章无需重复输入。
      try {
        if (sessionStorage.getItem(STORE_KEY) === '1') reveal();
      } catch (e) {}

      async function tryUnlock() {
        if (err) err.hidden = true;
        var hash = await sha256Hex(input.value);
        if (hash === PW_HASH) {
          try { sessionStorage.setItem(STORE_KEY, '1'); } catch (e) {}
          reveal();
        } else if (err) {
          err.hidden = false;
        }
      }

      if (btn) btn.addEventListener('click', tryUnlock);
      if (input) input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); tryUnlock(); }
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>

<style>
  .interview-lock {
    max-width: 22rem;
    margin: 2rem auto;
    padding: 1.5rem;
    border: 1px solid var(--card-border-color, #e9ecef);
    border-radius: 0.75rem;
    text-align: center;
    background: var(--card-bg, #fff);
  }
  .interview-lock__title { font-weight: 600; margin-bottom: 1rem; }
  .interview-lock__form { display: flex; gap: 0.5rem; }
  .interview-lock__form .form-control { flex: 1; }
  .interview-lock__err { color: #d9534f; margin-top: 0.75rem; margin-bottom: 0; }
</style>
