# The layout text of site
#
# 说明：这是 Chirpy 主题自带 _data/locales/zh-CN.yml 的本地覆盖副本
# （Jekyll 对 _data 同名文件是整体覆盖、不合并，所以必须保留全部字段）。
# 唯一新增内容：tabs 下的 `面试` 词条，用于给自定义「面试」标签页提供 <title>。
# 升级 chirpy 主题后，若官方此文件有变动，需同步更新本副本。

# ----- Commons label -----

layout:
  post: 文章
  category: 分类
  tag: 标签

# The tabs of sidebar
tabs:
  # format: <filename_without_extension>: <value>
  home: 首页
  categories: 分类
  tags: 标签
  archives: 归档
  about: 关于
  # 自定义标签：key 需与 _tabs/interview.md 的 title (面试) 一致
  面试: 面试

# the text displayed in the search bar & search results
search:
  hint: 搜索
  cancel: 取消
  no_results: 搜索结果为空

panel:
  lastmod: 最近更新
  trending_tags: 热门标签
  toc: 文章内容

copyright:
  # Shown at the bottom of the post
  license:
    template: 本文由作者按照 :LICENSE_NAME 进行授权
    name: CC BY 4.0
    link: https://creativecommons.org/licenses/by/4.0/

  # Displayed in the footer
  brief: 保留部分权利。
  verbose: >-
    除非另有说明，本网站上的博客文章均由作者按照知识共享署名 4.0 国际 (CC BY 4.0) 许可协议进行授权。

meta: 本站采用 :PLATFORM 主题 :THEME

not_found:
  statement: 抱歉，我们放错了该 URL，或者它指向了不存在的内容。

notification:
  update_found: 发现新内容
  update: 更新

theme:
  light: 浅色
  dark: 深色
  system: 跟随系统

# ----- Posts related labels -----

post:
  written_by: 作者
  posted: 发表于
  updated: 更新于
  words: 字
  pageview_measure: 次浏览
  read_time:
    unit: 分钟
    prompt: 阅读
  edit: 编辑此文
  relate_posts: 相关文章
  share: 分享
  button:
    next: 下一篇
    previous: 上一篇
    copy_code:
      succeed: 已复制！
    share_link:
      title: 分享链接
      succeed: 链接已复制！

# Date time format.
# See: <http://strftime.net/>, <https://day.js.org/docs/en/display/format>
df:
  post:
    strftime: "%Y/%m/%d"
    dayjs: "YYYY/MM/DD"

# categories page
categories:
  category_measure: 个分类
  post_measure: 篇文章
